name: Release

on:
  # Cut a release by pushing a version tag (e.g. v0.1.0).
  push:
    tags:
      - 'v*'
  # Allow manual runs from the Actions tab for testing.
  workflow_dispatch:

# `electron-builder --publish always` uses GITHUB_TOKEN to create the
# GitHub Release and upload installer artifacts, so we need write access
# to the repo contents.
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel other OS builds if one fails; release artifacts on the
      # OSes that did succeed are still useful.
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      # v5 of these actions uses the Node 24 runtime; v4 is on the
      # deprecated Node 20 runtime which GitHub started forcing to Node 24
      # on June 16, 2026.
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      # `npm ci` triggers the package.json `postinstall` script which runs
      # `electron-builder install-app-deps`. That rebuilds the native
      # better-sqlite3 module against Electron's ABI on this exact runner,
      # producing a binary the packaged installer can ship.
      - name: Install dependencies
        run: npm ci

      # Compile main + preload + renderer into out/. electron-builder
      # reads `files: out/**/*` from electron-builder.yml, so the package
      # step would fail with "no such directory" if we skip this.
      - name: Build app
        run: npm run build

      # Package the installers and upload them to the GitHub Release that
      # matches the tag triggering this run. On macOS this produces dmgs
      # for both x64 and arm64; on Windows an NSIS .exe; on Linux AppImage
      # + deb.
      #
      # NOTE: If x64 mac builds prove flaky on arm64 runners (because
      # better-sqlite3 needs an x64 prebuilt binary), drop x64 from
      # electron-builder.yml `mac.target.arch` and rely on Rosetta on
      # older Intel Macs.
      - name: Package and publish installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --no-install electron-builder --publish always
